<svg viewBox="0 0 900 680" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <rect x="0" y="0" width="900" height="680" fill="#ffffff"/>

  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#1f2933">Five-Layer Quantum-Resilient API Architecture</text>
  <text x="450" y="54" text-anchor="middle" font-size="13" fill="#52606d">Trust boundaries sit between each layer; each can migrate to post-quantum primitives on its own timeline</text>

  <!-- Layer 1: Transport -->
  <rect x="80" y="80" width="740" height="78" rx="10" fill="#1f2933"/>
  <text x="110" y="108" font-size="14.5" font-weight="700" fill="#ffffff">1. Transport Layer</text>
  <text x="110" y="128" font-size="12" fill="#cbd2d9">TLS 1.3 connection establishment</text>
  <text x="110" y="145" font-size="11" fill="#9aa5b1">Hybrid key exchange: X25519 + ML-KEM (FIPS 203)</text>

  <!-- boundary 1 -->
  <line x1="80" y1="168" x2="820" y2="168" stroke="#0d7a7a" stroke-width="1.5" stroke-dasharray="5,4"/>
  <rect x="700" y="160" width="100" height="16" fill="#ffffff"/>
  <text x="750" y="172" text-anchor="middle" font-size="10" fill="#0d7a7a">trust boundary</text>

  <!-- Layer 2: Certificate -->
  <rect x="80" y="178" width="740" height="78" rx="10" fill="#27414a"/>
  <text x="110" y="206" font-size="14.5" font-weight="700" fill="#ffffff">2. Certificate Layer</text>
  <text x="110" y="226" font-size="12" fill="#cbd2d9">X.509 issuance and chain validation</text>
  <text x="110" y="243" font-size="11" fill="#9aa5b1">Composite or parallel ML-DSA / SLH-DSA (FIPS 204/205) chains</text>

  <line x1="80" y1="266" x2="820" y2="266" stroke="#0d7a7a" stroke-width="1.5" stroke-dasharray="5,4"/>
  <rect x="700" y="262" width="100" height="16" fill="#ffffff"/>
  <text x="750" y="270" text-anchor="middle" font-size="10" fill="#0d7a7a">trust boundary</text>

  <!-- Layer 3: Token -->
  <rect x="80" y="276" width="740" height="78" rx="10" fill="#2f5360"/>
  <text x="110" y="304" font-size="14.5" font-weight="700" fill="#ffffff">3. Token Layer</text>
  <text x="110" y="324" font-size="12" fill="#cbd2d9">JWT issuance / OAuth 2.0 access &amp; refresh tokens</text>
  <text x="110" y="341" font-size="11" fill="#9aa5b1">alg header negotiation: RS256/ES256 to ML-DSA, dual-validated</text>

  <line x1="80" y1="364" x2="820" y2="364" stroke="#0d7a7a" stroke-width="1.5" stroke-dasharray="5,4"/>
  <rect x="700" y="360" width="100" height="16" fill="#ffffff"/>
  <text x="750" y="368" text-anchor="middle" font-size="10" fill="#0d7a7a">trust boundary</text>

  <!-- Layer 4: Gateway -->
  <rect x="80" y="374" width="740" height="78" rx="10" fill="#0d7a7a"/>
  <text x="110" y="402" font-size="14.5" font-weight="700" fill="#ffffff">4. Gateway Layer</text>
  <text x="110" y="422" font-size="12" fill="#e3f4f4">TLS termination, routing, token validation</text>
  <text x="110" y="439" font-size="11" fill="#bfe8e8">Externalized algorithm config for rollback / cryptographic agility</text>

  <line x1="80" y1="462" x2="820" y2="462" stroke="#0d7a7a" stroke-width="1.5" stroke-dasharray="5,4"/>
  <rect x="700" y="458" width="100" height="16" fill="#ffffff"/>
  <text x="750" y="466" text-anchor="middle" font-size="10" fill="#0d7a7a">trust boundary</text>

  <!-- Layer 5: Application -->
  <rect x="80" y="472" width="740" height="78" rx="10" fill="#52606d"/>
  <text x="110" y="500" font-size="14.5" font-weight="700" fill="#ffffff">5. Application Layer</text>
  <text x="110" y="520" font-size="12" fill="#e4e7eb">Business logic consuming validated requests</text>
  <text x="110" y="537" font-size="11" fill="#cbd2d9">Cryptography-agnostic given a stable lower-layer interface</text>

  <!-- footer callout -->
  <rect x="80" y="575" width="740" height="70" rx="8" fill="#f6f8f9" stroke="#cbd2d9"/>
  <text x="100" y="598" font-size="12.5" font-weight="700" fill="#1f2933">Cryptographic agility (cross-cutting)</text>
  <text x="100" y="617" font-size="11.5" fill="#52606d">Protocol-level algorithm identifiers (cipher suites, alg headers) and config-driven</text>
  <text x="100" y="634" font-size="11.5" fill="#52606d">selection allow each layer above to swap algorithms without structural re-architecture.</text>

  <text x="450" y="670" text-anchor="middle" font-size="10.5" fill="#9aa5b1">Fig. — Reference architecture per paper.tex, Section IV</text>
</svg>
