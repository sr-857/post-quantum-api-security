<svg viewBox="0 0 900 640" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="dep" markerWidth="9" markerHeight="9" refX="7" refY="2.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#52606d"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="900" height="640" fill="#ffffff"/>

  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#1f2933">Cryptographic Dependency Graph</text>
  <text x="450" y="54" text-anchor="middle" font-size="13" fill="#52606d">Which API components depend on which cryptographic primitives</text>

  <!-- Hard problems row -->
  <rect x="60" y="90" width="170" height="50" rx="8" fill="#1f2933"/>
  <text x="145" y="120" text-anchor="middle" font-size="12.5" fill="#ffffff" font-weight="600">Factoring / DLOG</text>

  <rect x="280" y="90" width="170" height="50" rx="8" fill="#1f2933"/>
  <text x="365" y="120" text-anchor="middle" font-size="12.5" fill="#ffffff" font-weight="600">Module-LWE / MSIS</text>

  <rect x="500" y="90" width="170" height="50" rx="8" fill="#1f2933"/>
  <text x="585" y="120" text-anchor="middle" font-size="12.5" fill="#ffffff" font-weight="600">Hash Collision Resist.</text>

  <rect x="720" y="90" width="140" height="50" rx="8" fill="#1f2933"/>
  <text x="790" y="120" text-anchor="middle" font-size="12.5" fill="#ffffff" font-weight="600">AES / Block Ciphers</text>

  <!-- Primitives row -->
  <rect x="40" y="200" width="130" height="46" rx="7" fill="#27414a"/>
  <text x="105" y="227" text-anchor="middle" font-size="12" fill="#ffffff">RSA</text>

  <rect x="190" y="200" width="130" height="46" rx="7" fill="#27414a"/>
  <text x="255" y="227" text-anchor="middle" font-size="12" fill="#ffffff">ECDSA / ECDHE</text>

  <rect x="340" y="200" width="130" height="46" rx="7" fill="#0d7a7a"/>
  <text x="405" y="221" text-anchor="middle" font-size="12" fill="#ffffff">ML-KEM</text>
  <text x="405" y="236" text-anchor="middle" font-size="9.5" fill="#bfe8e8">FIPS 203</text>

  <rect x="490" y="200" width="130" height="46" rx="7" fill="#0d7a7a"/>
  <text x="555" y="221" text-anchor="middle" font-size="12" fill="#ffffff">ML-DSA</text>
  <text x="555" y="236" text-anchor="middle" font-size="9.5" fill="#bfe8e8">FIPS 204</text>

  <rect x="640" y="200" width="130" height="46" rx="7" fill="#0d7a7a"/>
  <text x="705" y="221" text-anchor="middle" font-size="12" fill="#ffffff">SLH-DSA</text>
  <text x="705" y="236" text-anchor="middle" font-size="9.5" fill="#bfe8e8">FIPS 205</text>

  <rect x="780" y="200" width="90" height="46" rx="7" fill="#52606d"/>
  <text x="825" y="227" text-anchor="middle" font-size="11.5" fill="#ffffff">AES-256</text>

  <!-- Protocols row -->
  <rect x="60" y="320" width="190" height="54" rx="8" fill="#3b6f78"/>
  <text x="155" y="343" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">TLS 1.3 Key Exchange</text>
  <text x="155" y="360" text-anchor="middle" font-size="10" fill="#dff3f3">(hybrid: classical + PQC)</text>

  <rect x="280" y="320" width="190" height="54" rx="8" fill="#3b6f78"/>
  <text x="375" y="343" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">X.509 Certificates</text>
  <text x="375" y="360" text-anchor="middle" font-size="10" fill="#dff3f3">signature algorithm</text>

  <rect x="500" y="320" width="190" height="54" rx="8" fill="#3b6f78"/>
  <text x="595" y="343" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">JWT / OAuth 2.0</text>
  <text x="595" y="360" text-anchor="middle" font-size="10" fill="#dff3f3">alg header signature</text>

  <rect x="720" y="320" width="140" height="54" rx="8" fill="#3b6f78"/>
  <text x="790" y="343" text-anchor="middle" font-size="13" font-weight="600" fill="#ffffff">Session Encryption</text>
  <text x="790" y="360" text-anchor="middle" font-size="10" fill="#dff3f3">record protection</text>

  <!-- Consumers row -->
  <rect x="160" y="440" width="220" height="54" rx="8" fill="#cbd2d9"/>
  <text x="270" y="463" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2933">API Gateway</text>
  <text x="270" y="480" text-anchor="middle" font-size="10" fill="#3e4c59">terminates TLS, validates tokens</text>

  <rect x="420" y="440" width="220" height="54" rx="8" fill="#cbd2d9"/>
  <text x="530" y="463" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2933">Identity Provider</text>
  <text x="530" y="480" text-anchor="middle" font-size="10" fill="#3e4c59">issues JWTs / OAuth tokens</text>

  <!-- Connections: hard problems -> primitives -->
  <line x1="120" y1="140" x2="105" y2="200" stroke="#52606d" stroke-width="1.5" marker-end="url(#dep)"/>
  <line x1="170" y1="140" x2="255" y2="200" stroke="#52606d" stroke-width="1.5" marker-end="url(#dep)"/>
  <line x1="340" y1="140" x2="405" y2="200" stroke="#52606d" stroke-width="1.5" marker-end="url(#dep)"/>
  <line x1="390" y1="140" x2="555" y2="200" stroke="#52606d" stroke-width="1.5" marker-end="url(#dep)"/>
  <line x1="585" y1="140" x2="705" y2="200" stroke="#52606d" stroke-width="1.5" marker-end="url(#dep)"/>
  <line x1="790" y1="140" x2="825" y2="200" stroke="#52606d" stroke-width="1.5" marker-end="url(#dep)"/>

  <!-- primitives -> protocols -->
  <line x1="105" y1="246" x2="140" y2="320" stroke="#52606d" stroke-width="1.5" marker-end="url(#dep)"/>
  <line x1="255" y1="246" x2="170" y2="320" stroke="#52606d" stroke-width="1.5" marker-end="url(#dep)"/>
  <line x1="405" y1="246" x2="170" y2="320" stroke="#0d7a7a" stroke-width="1.5" marker-end="url(#dep)"/>
  <line x1="255" y1="246" x2="350" y2="320" stroke="#52606d" stroke-width="1.5" marker-end="url(#dep)"/>
  <line x1="555" y1="246" x2="390" y2="320" stroke="#0d7a7a" stroke-width="1.5" marker-end="url(#dep)"/>
  <line x1="555" y1="246" x2="590" y2="320" stroke="#0d7a7a" stroke-width="1.5" marker-end="url(#dep)"/>
  <line x1="705" y1="246" x2="610" y2="320" stroke="#0d7a7a" stroke-width="1.5" marker-end="url(#dep)"/>
  <line x1="825" y1="246" x2="790" y2="320" stroke="#52606d" stroke-width="1.5" marker-end="url(#dep)"/>

  <!-- protocols -> consumers -->
  <line x1="155" y1="374" x2="250" y2="440" stroke="#52606d" stroke-width="1.5" marker-end="url(#dep)"/>
  <line x1="375" y1="374" x2="290" y2="440" stroke="#52606d" stroke-width="1.5" marker-end="url(#dep)"/>
  <line x1="375" y1="374" x2="490" y2="440" stroke="#52606d" stroke-width="1.5" marker-end="url(#dep)"/>
  <line x1="595" y1="374" x2="560" y2="440" stroke="#52606d" stroke-width="1.5" marker-end="url(#dep)"/>
  <line x1="790" y1="374" x2="350" y2="440" stroke="#9aa5b1" stroke-width="1.3" stroke-dasharray="4,3"/>

  <!-- Legend -->
  <rect x="320" y="555" width="14" height="14" fill="#1f2933"/>
  <text x="342" y="566" font-size="11.5" fill="#334155">Hard problem</text>
  <rect x="460" y="555" width="14" height="14" fill="#0d7a7a"/>
  <text x="482" y="566" font-size="11.5" fill="#334155">Post-quantum primitive / dependency</text>

  <text x="450" y="620" text-anchor="middle" font-size="10.5" fill="#9aa5b1">Fig. — Dependency chain from hard mathematical problems to API-facing protocols</text>
</svg>
