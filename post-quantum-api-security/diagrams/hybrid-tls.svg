<svg viewBox="0 0 900 600" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#1f2933"/>
    </marker>
    <marker id="arrowAccent" markerWidth="10" markerHeight="10" refX="8" refY="3" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L8,3 L0,6 Z" fill="#0d7a7a"/>
    </marker>
  </defs>

  <rect x="0" y="0" width="900" height="600" fill="#ffffff"/>

  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#1f2933">Hybrid TLS 1.3 Handshake (ML-KEM + X25519)</text>
  <text x="450" y="54" text-anchor="middle" font-size="13" fill="#52606d">Combined key share secures the session against classical AND harvest-now-decrypt-later adversaries</text>

  <!-- Lifelines -->
  <line x1="160" y1="90" x2="160" y2="560" stroke="#9aa5b1" stroke-width="1.5"/>
  <line x1="740" y1="90" x2="740" y2="560" stroke="#9aa5b1" stroke-width="1.5"/>

  <!-- Actor boxes -->
  <rect x="80" y="55" width="160" height="40" rx="6" fill="#1f2933"/>
  <text x="160" y="80" text-anchor="middle" font-size="15" fill="#ffffff" font-weight="600">API Client</text>

  <rect x="660" y="55" width="160" height="40" rx="6" fill="#0d7a7a"/>
  <text x="740" y="80" text-anchor="middle" font-size="15" fill="#ffffff" font-weight="600">API Gateway / Server</text>

  <!-- Step 1: ClientHello -->
  <line x1="160" y1="130" x2="740" y2="130" stroke="#1f2933" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="450" y="120" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2933">1. ClientHello</text>
  <text x="450" y="146" text-anchor="middle" font-size="11.5" fill="#52606d">key_share: X25519 || ML-KEM-768 encapsulation key</text>

  <!-- Step 2: ServerHello -->
  <line x1="740" y1="195" x2="160" y2="195" stroke="#0d7a7a" stroke-width="2" marker-end="url(#arrowAccent)"/>
  <text x="450" y="185" text-anchor="middle" font-size="13" font-weight="600" fill="#0d7a7a">2. ServerHello</text>
  <text x="450" y="211" text-anchor="middle" font-size="11.5" fill="#52606d">key_share: X25519 ephemeral key || ML-KEM ciphertext</text>

  <!-- Combiner box -->
  <rect x="320" y="235" width="260" height="56" rx="8" fill="#eef6f6" stroke="#0d7a7a" stroke-width="1.3"/>
  <text x="450" y="256" text-anchor="middle" font-size="12.5" font-weight="700" fill="#0d7a7a">KDF Combiner</text>
  <text x="450" y="273" text-anchor="middle" font-size="11" fill="#334155">shared_secret = KDF(ECDHE_secret || ML-KEM_secret)</text>
  <text x="450" y="286" text-anchor="middle" font-size="10" fill="#7b8794">secure if either component remains unbroken</text>

  <!-- Step 3: Server cert + finished -->
  <line x1="740" y1="330" x2="160" y2="330" stroke="#0d7a7a" stroke-width="2" marker-end="url(#arrowAccent)"/>
  <text x="450" y="320" text-anchor="middle" font-size="13" font-weight="600" fill="#0d7a7a">3. EncryptedExtensions, Certificate, CertVerify, Finished</text>
  <text x="450" y="346" text-anchor="middle" font-size="11.5" fill="#52606d">Certificate signed with ML-DSA or composite classical/PQC key</text>

  <!-- Step 4: Client Finished -->
  <line x1="160" y1="395" x2="740" y2="395" stroke="#1f2933" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="450" y="385" text-anchor="middle" font-size="13" font-weight="600" fill="#1f2933">4. Finished</text>
  <text x="450" y="411" text-anchor="middle" font-size="11.5" fill="#52606d">Handshake authenticated; application traffic keys derived</text>

  <!-- Step 5: app data -->
  <line x1="160" y1="450" x2="740" y2="450" stroke="#9aa5b1" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <line x1="740" y1="475" x2="160" y2="475" stroke="#9aa5b1" stroke-width="2" stroke-dasharray="6,4" marker-end="url(#arrow)"/>
  <text x="450" y="440" text-anchor="middle" font-size="13" font-weight="600" fill="#334155">5. Application Data (API Request / Response)</text>
  <text x="450" y="495" text-anchor="middle" font-size="11.5" fill="#52606d">Protected under hybrid-derived session keys</text>

  <!-- Legend -->
  <rect x="160" y="520" width="14" height="14" fill="#1f2933"/>
  <text x="182" y="531" font-size="12" fill="#334155">Client-initiated message</text>
  <rect x="400" y="520" width="14" height="14" fill="#0d7a7a"/>
  <text x="422" y="531" font-size="12" fill="#334155">Server-initiated message</text>
  <rect x="620" y="520" width="14" height="14" fill="#9aa5b1"/>
  <text x="642" y="531" font-size="12" fill="#334155">Post-handshake traffic</text>

  <text x="450" y="575" text-anchor="middle" font-size="10.5" fill="#9aa5b1">Fig. — Hybrid key exchange per IETF draft-ietf-tls-hybrid-design; classical fallback omitted for clarity</text>
</svg>
