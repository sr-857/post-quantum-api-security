name: Build Paper

# Verifies that paper/paper.tex compiles cleanly on every push and pull
# request that touches the paper source or bibliography. This catches
# LaTeX syntax errors and missing citations before merge.

on:
  push:
    branches: [main]
    paths:
      - 'paper/**'
      - 'scripts/compile-latex.sh'
      - 'scripts/generate-bib.sh'
  pull_request:
    branches: [main]
    paths:
      - 'paper/**'
      - 'scripts/compile-latex.sh'
      - 'scripts/generate-bib.sh'
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install TeX Live
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            texlive-latex-extra \
            texlive-publishers \
            texlive-bibtex-extra \
            texlive-fonts-recommended

      - name: Validate bibliography
        run: ./scripts/generate-bib.sh

      - name: Compile paper
        run: ./scripts/compile-latex.sh

      - name: Verify PDF was produced
        run: |
          test -f paper/paper.pdf
          echo "paper.pdf size: $(stat -c%s paper/paper.pdf) bytes"

      - name: Upload compiled PDF as artifact
        uses: actions/upload-artifact@v4
        with:
          name: paper-pdf
          path: paper/paper.pdf
          retention-days: 14
