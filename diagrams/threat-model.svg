<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="atk" markerWidth="9" markerHeight="9" refX="7" refY="2.5" orient="auto" markerUnits="strokeWidth">
      <path d="M0,0 L7,2.5 L0,5 Z" fill="#b3261e"/>
    </marker>
  </defs>
  <rect x="0" y="0" width="900" height="620" fill="#ffffff"/>

  <text x="450" y="32" text-anchor="middle" font-size="20" font-weight="700" fill="#1f2933">Threat Model: Adversaries, Assets, and Attack Surfaces</text>
  <text x="450" y="54" text-anchor="middle" font-size="13" fill="#52606d">Classical and harvest-now-decrypt-later (HNDL) adversary classes against API communication</text>

  <!-- Adversary boxes -->
  <rect x="50" y="90" width="240" height="84" rx="9" fill="#1f2933"/>
  <text x="170" y="116" text-anchor="middle" font-size="13.5" font-weight="700" fill="#ffffff">Classical Network Adversary</text>
  <text x="170" y="136" text-anchor="middle" font-size="10.5" fill="#cbd2d9">Passive eavesdropping, active MITM,</text>
  <text x="170" y="150" text-anchor="middle" font-size="10.5" fill="#cbd2d9">cert / token forgery attempts</text>
  <text x="170" y="164" text-anchor="middle" font-size="9.5" fill="#9aa5b1">bounded by classical compute</text>

  <rect x="610" y="90" width="240" height="84" rx="9" fill="#b3261e"/>
  <text x="730" y="116" text-anchor="middle" font-size="13.5" font-weight="700" fill="#ffffff">HNDL Adversary</text>
  <text x="730" y="136" text-anchor="middle" font-size="10.5" fill="#fbe2e0">Records encrypted traffic + certs</text>
  <text x="730" y="150" text-anchor="middle" font-size="10.5" fill="#fbe2e0">today; decrypts once CRQC exists</text>
  <text x="730" y="164" text-anchor="middle" font-size="9.5" fill="#f3b8b3">bounded by data retention, not compute</text>

  <!-- Attack surface row -->
  <rect x="60" y="220" width="170" height="58" rx="7" fill="#27414a"/>
  <text x="145" y="245" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">TLS Handshake</text>
  <text x="145" y="263" text-anchor="middle" font-size="10" fill="#cbd2d9">key exchange interception</text>

  <rect x="260" y="220" width="170" height="58" rx="7" fill="#27414a"/>
  <text x="345" y="245" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Certificate Chain</text>
  <text x="345" y="263" text-anchor="middle" font-size="10" fill="#cbd2d9">forged / substituted CA signatures</text>

  <rect x="460" y="220" width="170" height="58" rx="7" fill="#27414a"/>
  <text x="545" y="245" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">Bearer Tokens</text>
  <text x="545" y="263" text-anchor="middle" font-size="10" fill="#cbd2d9">JWT / OAuth 2.0 signature forgery</text>

  <rect x="660" y="220" width="170" height="58" rx="7" fill="#27414a"/>
  <text x="745" y="245" text-anchor="middle" font-size="12" font-weight="600" fill="#ffffff">API Gateway</text>
  <text x="745" y="263" text-anchor="middle" font-size="10" fill="#cbd2d9">misconfigured algorithm fallback</text>

  <!-- arrows from adversaries to surfaces -->
  <line x1="170" y1="174" x2="145" y2="220" stroke="#1f2933" stroke-width="1.6" marker-end="url(#atk)"/>
  <line x1="200" y1="174" x2="345" y2="220" stroke="#1f2933" stroke-width="1.6" marker-end="url(#atk)"/>
  <line x1="240" y1="174" x2="545" y2="220" stroke="#1f2933" stroke-width="1.6" marker-end="url(#atk)"/>
  <line x1="270" y1="174" x2="745" y2="220" stroke="#1f2933" stroke-width="1.6" marker-end="url(#atk)"/>

  <line x1="700" y1="174" x2="180" y2="220" stroke="#b3261e" stroke-width="1.6" stroke-dasharray="5,3" marker-end="url(#atk)"/>
  <line x1="690" y1="174" x2="380" y2="220" stroke="#b3261e" stroke-width="1.6" stroke-dasharray="5,3" marker-end="url(#atk)"/>

  <!-- Protected assets -->
  <rect x="160" y="340" width="580" height="84" rx="9" fill="#0d7a7a"/>
  <text x="450" y="365" text-anchor="middle" font-size="13.5" font-weight="700" fill="#ffffff">Protected Assets</text>
  <text x="450" y="388" text-anchor="middle" font-size="11" fill="#e3f4f4">Confidentiality of data in transit · Integrity/authenticity of requests &amp; responses</text>
  <text x="450" y="405" text-anchor="middle" font-size="11" fill="#e3f4f4">Long-term validity of certificate chains &amp; trust anchors · Integrity of bearer tokens</text>

  <line x1="145" y1="278" x2="300" y2="340" stroke="#52606d" stroke-width="1.4"/>
  <line x1="345" y1="278" x2="380" y2="340" stroke="#52606d" stroke-width="1.4"/>
  <line x1="545" y1="278" x2="520" y2="340" stroke="#52606d" stroke-width="1.4"/>
  <line x1="745" y1="278" x2="600" y2="340" stroke="#52606d" stroke-width="1.4"/>

  <!-- Security goals -->
  <rect x="80" y="460" width="740" height="100" rx="9" fill="#f6f8f9" stroke="#cbd2d9"/>
  <text x="100" y="484" font-size="12.5" font-weight="700" fill="#1f2933">Security Goals</text>
  <text x="100" y="504" font-size="11" fill="#334155">• Forward secrecy at transport layer against BOTH classical and HNDL adversaries (hybrid TLS, Section V)</text>
  <text x="100" y="521" font-size="11" fill="#334155">• Unforgeability of certificates and tokens against quantum-capable signature forgery (Section VI)</text>
  <text x="100" y="538" font-size="11" fill="#334155">• Backward compatibility with classical-only clients during migration, without weakening PQC-client security</text>

  <text x="450" y="600" text-anchor="middle" font-size="10.5" fill="#9aa5b1">Fig. — Threat model summarized from paper.tex Section III and docs/threat-model.md</text>
</svg>
